<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSVP</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main class="container p-5">
        <div class="card mx-auto p-4" style="max-width: 720px">
            <header class="text-center py-5">
                <div class="display-4">🌿 🦔 🍄 🌰 🦉</div>
                <h1 class="mt-3">You're Invited</h1>
                <p class="lead">[Event subtitle / date / location]</p>
            </header>

            <form id="rsvp-form">
                <label for="name">Name</label>
                <input type="text" id="name" class="form-control" required />
                
                <label for="attending" class="mt-3">Will you be attending?</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="attending" id="attending-yes" value="yes" required />
                    <label class="form-check-label" for="attending-yes">Yes, I'll be there!</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="attending" id="attending-no" value="no" required />
                    <label class="form-check-label" for="attending-no">Sorry, I can't make it.</label>
                </div>

                <hr>  
                <!-- guest_count (hidden when attending = 0) -->
                <div class="form-group" id="guest-count-row" class="d-none">
                    <label for="guest_count">Number of Guests</label>
                    <input type="number" id="guest_count" class="form-control" min="0" />
                </div>
                <!-- dietary textarea -->
                <div class="form-group">
                    <label for="dietary">Dietary Restrictions</label>
                    <textarea id="dietary" class="form-control" rows="3"></textarea>
                </div>
                <!-- message textarea -->
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" class="form-control" rows="3"></textarea>
                </div>
                <!-- submit button with spinner -->
                <button type="submit" id="submit-btn" class="btn btn-primary">Send RSVP</button>
            </form>

            <!-- Shown on success, hidden by default -->
            <div id="success-message" class="d-none text-center py-4">
                <div class="display-3">🌿</div>
                <h2>Thank you!</h2>
                <p>We've received your RSVP and can't wait to celebrate with you.</p>
            </div>

            <!-- Shown on error, hidden by default -->
            <div id="error-alert" class="alert alert-danger d-none mt-3"></div>
        </div>
    </main>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
