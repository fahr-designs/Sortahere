<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Thank You · Baby Aguilar-Hernandez-Ross</title>

	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link
		href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Cinzel:wght@400;600&family=Lato:wght@300;400;700&display=swap"
		rel="stylesheet" />

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
	<link rel="stylesheet" href="style.css" />
	<style>
		.success-container {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			padding: 2rem 1rem;
		}

		.success-card {
			background-color: var(--cream);
			border-radius: 24px;
			padding: 3rem 2rem;
			box-shadow:
				0 4px 24px rgba(0, 0, 0, 0.12),
				inset 0 1px 0 rgba(255, 255, 255, 0.8);
			border: 1px solid var(--border);
			text-align: center;
			max-width: 500px;
			width: 100%;
		}

		.success-creature {
			font-size: 5rem;
			display: block;
			margin-bottom: 1.5rem;
			animation: foxBounce 3s ease-in-out infinite;
		}

		.success-title {
			font-family: var(--font-display);
			font-size: clamp(2.2rem, 6vw, 3rem);
			color: var(--brown-dark);
			margin: 0 0 1rem;
			line-height: 1.2;
		}

		.success-text {
			color: var(--brown-light);
			line-height: 1.8;
			font-size: 1rem;
			margin: 0 0 2rem;
		}

		.success-registry {
			background: rgba(125, 158, 130, 0.08);
			border: 2px solid var(--sage-light);
			border-radius: 16px;
			padding: 1.5rem;
			margin: 2rem 0;
		}

		.registry-label {
			font-family: var(--font-label);
			font-size: 0.7rem;
			letter-spacing: 2px;
			text-transform: uppercase;
			color: var(--brown-dark);
			margin: 0 0 0.75rem;
			display: block;
			font-weight: 600;
		}

		.registry-link {
			color: var(--sage-dark);
			text-decoration: none;
			font-size: 0.85rem;
			word-break: break-all;
			transition: color 0.2s;
			font-weight: 500;
		}

		.registry-link:hover {
			color: var(--brown-dark);
			text-decoration: underline;
		}

		.return-btn {
			display: inline-block;
			padding: 0.9rem 2rem;
			background-color: var(--amber);
			color: #fff;
			text-decoration: none;
			border-radius: 12px;
			font-family: var(--font-label);
			font-size: 0.75rem;
			letter-spacing: 2px;
			text-transform: uppercase;
			cursor: pointer;
			transition:
				background-color 0.2s,
				transform 0.1s,
				box-shadow 0.2s;
			box-shadow: 0 3px 12px rgba(193, 127, 58, 0.35);
			border: none;
		}

		.return-btn:hover {
			background-color: var(--amber-dark);
			transform: translateY(-1px);
			box-shadow: 0 5px 16px rgba(193, 127, 58, 0.45);
			color: #fff;
		}

		.return-btn:active {
			transform: translateY(0);
		}

		@media (max-width: 600px) {
			.success-card {
				padding: 2rem 1.25rem;
			}

			.success-creature {
				font-size: 3.5rem;
				margin-bottom: 1rem;
			}

			.success-title {
				font-size: 2rem;
			}

			.success-text {
				font-size: 0.95rem;
			}
		}
	</style>
</head>

<body>

	<!-- Decorative woodland creature corners -->
	<div class="creature creature-tl" aria-hidden="true">🐻</div>
	<div class="creature creature-tr" aria-hidden="true">🦊</div>
	<div class="creature creature-bl" aria-hidden="true">🦔</div>
	<div class="creature creature-br" aria-hidden="true">🦝</div>

	<!-- Leaf sprigs -->
	<div class="leaf-sprig sprig-1" aria-hidden="true">🌿</div>
	<div class="leaf-sprig sprig-2" aria-hidden="true">🍃</div>
	<div class="leaf-sprig sprig-3" aria-hidden="true">🌾</div>
	<div class="leaf-sprig sprig-4" aria-hidden="true">🍃</div>

	<div class="success-container">
		<div class="success-card">
			<div class="success-creature">🦊</div>

			<h1 class="success-title">Thank You!</h1>

			<p class="success-text">
				Your RSVP has been received.<br />
				We can't wait to celebrate with you!
			</p>

			<div class="success-registry">
				<span class="registry-label">Check Out Our Registry:</span>
				<a href="https://my.babylist.com/ydirpkmcn" target="_blank" rel="noopener" class="registry-link">
					my.babylist.com/ydirpkmcn
				</a>
			</div>

			<a href="/" class="return-btn">← Return to Event</a>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
